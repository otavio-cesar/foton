- name: Configure Foton hosts
  hosts: foton_nodes
  become: true
  tasks:
    - name: Install base packages
      ansible.builtin.package:
        name:
          - docker
          - git
        state: present

    - name: Enable Docker service
      ansible.builtin.service:
        name: docker
        enabled: true
        state: started

    - name: Create application directory
      ansible.builtin.file:
        path: /opt/foton
        state: directory
        mode: "0755"
